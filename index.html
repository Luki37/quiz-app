<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuizApp</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link
      rel="icon"
      type="image/png"
      sizes="192x192"
      href="android-chrome-192x192.png"
    />
  </head>
  <body>
    <div id="wrapper">
      <div class="intro">Klicke auf "Weiter" um zu starten!</div>
    </div>
    <div class="footer">
      <button class="button" id="result" onclick="showResult()">Lösung</button>
      <button class="button" onclick="next()">Weiter</button>
    </div>
    <div class="formContainer">
      <p class="formTitle">Hier kannst du deine Frage erfassen:</p>
      <p class="info">
        Gib eine Frage und die richtige Antwort ein, dazu noch drei falsche
        Antworten für die Auswahl. dann drücke "Speichern".
      </p>
      <div class="formQuest">
        <p>Frage:</p>
        <input id="inputQuest" placeholder="Frage eingeben" type="text" />
        <p>Richtige Antwort:</p>
        <input
          id="inputTrueAnswer"
          placeholder="Richtige Antwort eingeben"
          type="text"
        />
        <p>Falsche Antwort:</p>
        <input
          id="inputFalseAnswer1"
          placeholder="Falsche Anwort eingeben"
          type="text"
        />
        <p>Falsche Antwort:</p>
        <input
          id="inputFalseAnswer2"
          placeholder="Falsche Anwort eingeben"
          type="text"
        />
        <p>Falsche Antwort:</p>
        <input
          id="inputFalseAnswer3"
          placeholder="Falsche Anwort eingeben"
          type="text"
        />
      </div>
      <div class="formBtn">
        <button class="button" onclick="reset()">Abbrechen</button>
        <button class="button" onclick="saveQuest()">Speichern</button>
        <button class="button" onclick="exportLocalStorage()">
          Daten exportieren
        </button>
        <button class="button" onclick="ortLocalStorage()">
          Daten importieren
        </button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
